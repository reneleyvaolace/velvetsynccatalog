<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="magentaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E43681;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B9D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#0A0A0A" rx="20"/>
  
  <!-- Grid pattern (8-bit precision) -->
  <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
    <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#1A1A1A" stroke-width="0.5"/>
  </pattern>
  <rect width="100" height="100" fill="url(#grid)" rx="20"/>
  
  <!-- Dual Sync Waves (Infinity symbol representing dual channel sync) -->
  <g filter="url(#glow)">
    <!-- Magenta wave (CH1) -->
    <path d="M 20 50 Q 35 20 50 50 Q 65 80 80 50" 
          fill="none" 
          stroke="url(#magentaGradient)" 
          stroke-width="4" 
          stroke-linecap="round"
          opacity="0.9"/>
    
    <!-- Cyan wave (CH2) -->
    <path d="M 20 50 Q 35 80 50 50 Q 65 20 80 50" 
          fill="none" 
          stroke="url(#cyanGradient)" 
          stroke-width="4" 
          stroke-linecap="round"
          opacity="0.9"/>
    
    <!-- Center point (sync point) -->
    <circle cx="50" cy="50" r="3" fill="#FFFFFF" opacity="0.8"/>
  </g>
  
  <!-- V shape (Velvet) - subtle background -->
  <path d="M 30 30 L 50 60 L 70 30" 
        fill="none" 
        stroke="#1A1A1A" 
        stroke-width="2" 
        stroke-linecap="round"
        opacity="0.5"/>
</svg>
